<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album Player</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
</head>

<body>
  <video 
    id="desktopVideo"
    class="bg-video desktop-video"
    autoplay 
    muted 
    loop 
    playsinline
  ></video>

  <video 
    id="mobileVideo"
    class="bg-video mobile-video"
    autoplay 
    muted 
    loop 
    playsinline
  ></video>

  <img 
    id="artwork"
    class="bg-artwork"
  />

  <div class="overlay">
    <div class="top-meta-info">
      <div class="song-info">
        <div class="logo">
          <img class="patiobear-img" src="bear copy.png" height="50" width="50">
          <div>
            <h1 id="patiobear">Patio Bear</h1>
          </div>
        </div>
        <h2 id="songTitle"></h2>
        <div id="songCredits"></div>
      </div>
      <div class="navbar">
        <button class="playback-control nav-item nav-item-songs" data-category="songs">Songs</button>
        <button class="playback-control nav-item nav-item-scores" data-category="scores">Scores</button>
        <button class="playback-control nav-item nav-item-promos" data-category="promos">Promos</button>
        <div class="links">
          <a href="https://open.spotify.com/artist/56UjJs0m3Frd740BGGNBwm?si=zR4A1UVMSJOA3hPgvLE9JQ"><i class="fa-brands fa-spotify"></i></a>
          <a href="https://music.apple.com/us/artist/patio-bear/1531407958"><i class="fa-brands fa-apple"></i></a>
          <a href="https://www.youtube.com/@patiobear8681"><i class="fa-brands fa-youtube"></i></a>
          <a href="https://patiobear.bandcamp.com/music"><i class="fa-brands fa-bandcamp"></i></a>
        </div>
        <!-- <button class="playback-control nav-item nav-item-about">About</button> -->
    </div>
    </div>
      <div class="bottom-toolbar">
        <div class="controls">
          <button class='playback-control' id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
          <button class='playback-control' id="muteBtn"><i class="mute-btn-icon fa-solid fa-volume-xmark"></i></button>
          <button class='playback-control' id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
        </div>
        <!-- <div id="progressBar" class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        <div id="progressHandle" class="progress-handle"></div>
      </div> -->
      <input
        id="progress"
        class="progress"
        type="range"
        min="0"
        max="100"
        value="0"
      />
    </div>
  </div>
